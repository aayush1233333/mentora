services:
  - type: web
    runtime: docker
    name: mentora-backend
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: ENV
        value: production
      - key: WEB_CONCURRENCY
        value: 1
      - key: CORS_ORIGINS
        value: https://your-vercel-app.vercel.app
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: OPENAI_API_KEY
        sync: false
